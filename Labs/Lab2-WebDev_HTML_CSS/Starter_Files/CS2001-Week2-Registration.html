<!DOCTYPE html>
<html lang="en">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <head>
        <title>
            Fresh Food For All
        </title>
        <script src="CS2001-Week2-Registration.js"></script>
        <link rel="stylesheet" href="CS2001-Week2-Registration.css">
    </head>
    <body>
        <header></header>
        <nav>

            <!-- ToDo: An unordered list to represent the menu, 
                       each list item should correspond to the menu items (Home, Register, Login, Help)
                       The css class of the menu is "navlist"
                       Check lecture slides about lists, an example of a more basic menu, and CSS class selector-->
            <ul class="navlist">
                <li><a href="">Home</a></li>
                <li><a href="">Register</a></li>
                <li><a href="">Login</a></li>
                <li><a href="">Help</a></li>
            </ul>
         </nav>
        <main>
            <!-- Check Week 2 Lecture to learn about HTML5 semantic elements-->
            <aside>
                <input type="text" class="Search" placeholder="Search"> </input>
            </aside>
            <section>
                <form class="center"  id="form" onsubmit="return validation(event)" >
                <!-- ToDo: Implement the form containing 
                           Name - type text
                           email- type text
                           password - type text
                           Terms of Service - type checkbox
                           Register - button
                           Learn more - link
                           Check lecture slides and the links on the slides to learn about forms
                           and how to create a button that would react to a click Event
                        -->
                    <div class="name">
                        <div class="nameheading">Name</div>
                        <input type="text" class="textbox" id="name"/>
                    </div>
                    <div class="email">
                        <div class="emailheading">Email</div>
                        <input type="text" class="textbox" id="email"/>
                    </div>
                    <div class="Password">
                        <div class="passwordheading">Password</div>
                        <input type="password" class="password" id="password"/>
                    </div>
                    <div class="confirmpass">
                        <div class="confirmpasstext">Re-Type Password</div>
                        <input type="password" name="" class="password" id="confirmpass"/>
                    </div>

                    <!-- Example given for user type checkboxes-->
                    
                    <input type="checkbox" id="buyer" name="buyer" value="buyer">
                    <label for="buyer">I want to buy produce directly from allotment owners.</label><br>
                    <input type="checkbox" id="seller" name="seller" value="seller">
                    <label for="seller">I want to sell produce from my allotment.</label><br><br><br>
                    <input type="checkbox" name="Terms" id="Terms">
                    <label for="Terms">I agree the <a href="">Terms of Use</a> and <a href="">Privacy Policy</a></label>
                    <br><br>
                    <input type="submit" value="Register">| <a href="">Learn more</a>
                </form>
                <div class="center" id="hiddenSection" id="bottomform">
                    <p id="hiddenParagraph"></p>
                </div>
            </section>
        </main>
    </body>
</html>
